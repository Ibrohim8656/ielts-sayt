<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS PRACTICE ZEMSTARK - Mening Profilim</title>
    <link rel="stylesheet" href="style.css?v=2">
</head>

<body class="profile-body">
    <header class="app-header">
        <div class="brand">
            <h1><a href="index.html">IELTS PRACTICE <span class="brand-sub">ZEMSTARK</span></a></h1>
        </div>
        <div style="display:flex; align-items:center;">
            <button class="theme-toggle" onclick="toggleTheme()" id="theme-icon">🌙</button>
            <nav class="auth-nav">
                <button id="logout-btn" class="nav-btn logout">Chiqish</button>
            </nav>
        </div>
    </header>

    <main class="profile-container">
        <div class="profile-header">
            <div class="profile-avatar">👤</div>
            <div class="profile-info">
                <h2 id="profile-name">Yuklanmoqda...</h2>
                <p id="profile-phone">Yuklanmoqda...</p>
            </div>
        </div>

        <div class="assignments-section" style="margin-top: 30px;">
            <h3>Mening Vazifalarim</h3>
            <div class="card-grid" id="student-assignments-list"
                style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px;">
                <p class="loading-msg">Vazifalar tekshirilmoqda...</p>
            </div>
        </div>

        <div class="scores-section" style="margin-top: 30px;">
            <h3>Natijalar O'sish Dinamikasi</h3>
            <div
                style="background: var(--surface-color); padding: 15px; border-radius: 8px; margin-bottom: 30px; border: 1px solid var(--border-color);">
                <canvas id="scoreChart" width="400" height="200"></canvas>
            </div>

            <h3>Mening Natijalarim</h3>
            <div class="scores-list" id="scores-container">
                <p class="loading-msg">Natijalar yuklanmoqda...</p>
                <!-- Scores will be injected here via JS -->
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js?v=2"></script>
    <script>
        // Check if user is logged in before rendering profile
        document.addEventListener('DOMContentLoaded', () => {
            if (!localStorage.getItem('token')) {
                window.location.href = 'login.html';
            } else {
                fetchProfileData().then(() => renderChart());
                loadStudentAssignments();
            }
        });

        // Load Student Assignments
        async function loadStudentAssignments() {
            const list = document.getElementById('student-assignments-list');
            try {
                const token = localStorage.getItem('token');
                const res = await fetch('/api/user/assignments', { headers: { 'Authorization': 'Bearer ' + token } });
                const assignments = await res.json();

                if (assignments.length === 0) {
                    list.innerHTML = `<p style="grid-column:1/-1; color:var(--text-muted);">Hozircha sizga vazifa berilmagan.</p>`;
                    return;
                }

                list.innerHTML = assignments.map(a => {
                    let btnText = "Boshlash";
                    let link = `${a.test_type}.html?id=${a.test_id}&assignment=${a.id}`;

                    return `
                    <div style="background:var(--surface-color); border:1px solid var(--border-color); border-radius:10px; padding:20px; box-shadow:0 2px 5px rgba(0,0,0,0.05);">
                        <div style="font-size:0.8rem; color:var(--primary-color); font-weight:bold; text-transform:uppercase; margin-bottom:5px;">
                            ${a.test_type} | ${a.class_name}
                        </div>
                        <div style="font-size:1.1rem; font-weight:bold; margin-bottom:10px; color:var(--text-main);">
                            ${a.test_title || 'Nomsiz Test'}
                        </div>
                        <div style="font-size:0.9rem; color:var(--text-muted); margin-bottom:15px;">
                            Berildi: ${new Date(a.assigned_at).toLocaleDateString('uz-UZ')}
                        </div>
                        <a href="${link}" style="display:block; text-align:center; background:var(--primary-color); color:white; padding:10px; border-radius:8px; text-decoration:none; font-weight:bold;">${btnText}</a>
                    </div>
                `}).join('');
            } catch (e) {
                list.innerHTML = `<p style="color:var(--error-color);">Xatolik yuz berdi</p>`;
            }
        }

        // Global function to be called after fetchProfileData populated window.userScores
        async function renderChart() {
            if (!window.userScores || window.userScores.length === 0) return;

            // Sort scores by date ascending for the chart
            const sorted = [...window.userScores].reverse();

            const labels = [];
            const listeningData = [];
            const readingData = [];

            sorted.forEach(s => {
                const dateRaw = new Date(s.date);
                const dateStr = `${dateRaw.getDate()}/${dateRaw.getMonth() + 1} ${dateRaw.getHours()}:${(dateRaw.getMinutes() < 10 ? '0' : '') + dateRaw.getMinutes()}`;

                // percentage string mapping
                let pct = Math.round((s.correct / s.total) * 100);

                labels.push(dateStr);

                if (s.section.toLowerCase().includes('listening')) {
                    listeningData.push(pct);
                    readingData.push(null); // Keep gaps
                } else if (s.section.toLowerCase().includes('reading')) {
                    readingData.push(pct);
                    listeningData.push(null);
                } else {
                    listeningData.push(null);
                    readingData.push(null);
                }
            });

            const ctx = document.getElementById('scoreChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Listening Natijasi (%)',
                            data: listeningData,
                            borderColor: '#3b82f6',
                            backgroundColor: 'rgba(59, 130, 246, 0.2)',
                            spanGaps: true,
                            tension: 0.3,
                            fill: true,
                            pointRadius: 5
                        },
                        {
                            label: 'Reading Natijasi (%)',
                            data: readingData,
                            borderColor: '#10b981',
                            backgroundColor: 'rgba(16, 185, 129, 0.2)',
                            spanGaps: true,
                            tension: 0.3,
                            fill: true,
                            pointRadius: 5
                        }
                    ]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 100,
                            ticks: {
                                callback: function (value) { return value + '%' }
                            }
                        }
                    },
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: function (context) {
                                    return context.dataset.label + ': ' + context.parsed.y + '%';
                                }
                            }
                        }
                    }
                }
            });
        }
    </script>
</body>

</html>
