<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS PRACTICE ZEMSTARK - Admin Panel</title>
    <link rel="stylesheet" href="style.css?v=2">
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--surface-color);
            padding: 25px 30px;
            border-radius: 12px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            margin-bottom: 30px;
        }

        .admin-header h2 {
            color: var(--primary-color);
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .users-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        .user-card {
            background: var(--surface-color);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            border-top: 4px solid var(--primary-color);
        }

        .user-card-header {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 15px;
        }

        .user-name {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 5px;
        }

        .user-phone {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .admin-score-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px dotted var(--border-color);
        }

        .admin-score-item:last-child {
            border-bottom: none;
        }

        .admin-score-details {
            display: flex;
            flex-direction: column;
        }

        .admin-score-section {
            font-weight: 600;
            color: var(--text-main);
            font-size: 0.95rem;
        }

        .admin-score-date {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 3px;
        }

        .admin-score-result {
            font-weight: 700;
            color: var(--primary-color);
            background: #eff6ff;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        .no-records {
            text-align: center;
            color: var(--text-muted);
            padding: 40px;
            grid-column: 1 / -1;
            background: var(--surface-color);
            border-radius: 12px;
        }

        .user-scores-list {
            max-height: 250px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .user-scores-list::-webkit-scrollbar {
            width: 6px;
        }

        .user-scores-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .user-scores-list::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        /* Tabs Styling */
        .admin-tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }

        .admin-tab {
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-muted);
            border: none;
            background: none;
            position: relative;
        }

        .admin-tab.active {
            color: var(--primary-color);
        }

        .admin-tab.active::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--primary-color);
            border-radius: 3px 3px 0 0;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Test Bank Styling */
        .test-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .add-test-btn {
            background: var(--primary-color);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(37, 99, 235, 0.2);
        }

        .test-list {
            background: var(--surface-color);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .test-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            border-bottom: 1px solid var(--border-color);
        }

        .test-item:last-child {
            border-bottom: none;
        }

        .test-item-title {
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--text-main);
        }

        .test-actions button {
            padding: 6px 12px;
            margin-left: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .btn-edit {
            background: #f59e0b;
            color: white;
        }

        .btn-delete {
            background: var(--error-color);
            color: white;
        }

        /* Modal Styling */
        .cms-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .cms-modal.active {
            display: flex;
        }

        .cms-modal-content {
            background: var(--surface-color);
            width: 100%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .cms-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .cms-modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-muted);
        }

        .cms-form-group {
            margin-bottom: 20px;
        }

        .cms-form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-main);
        }

        .cms-form-group input,
        .cms-form-group textarea,
        .cms-form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: inherit;
        }

        .cms-form-group textarea {
            min-height: 150px;
            resize: vertical;
        }

        .cms-save-btn {
            background: var(--success-color);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
    </style>
    <script>if (!localStorage.getItem('token')) { window.location.href = 'login.html'; }</script>
</head>

<body class="profile-body">
    <header class="app-header">
        <div class="brand">
            <h1><a href="index.html">IELTS PRACTICE <span class="brand-sub">ZEMSTARK</span></a></h1>
        </div>
        <nav class="auth-nav">
            <button id="logout-btn" class="nav-btn logout">Chiqish</button>
        </nav>
    </header>

    <main class="admin-container">
        <div class="admin-header">
            <h2>👨‍🏫 O'qituvchi Boshqaruvi (Admin)</h2>
            <div id="total-students">Yuklanmoqda...</div>
        </div>

        <div class="admin-tabs">
            <button class="admin-tab active" onclick="switchTab('students')">O'quvchilar</button>
            <button class="admin-tab" onclick="switchTab('tests')">Testlar</button>
        </div>

        <div id="students-tab" class="tab-content active">
            <div class="users-grid" id="users-grid">
                <div class="no-records">Ma'lumotlar yuklanmoqda...</div>
            </div>
        </div>

        <div id="tests-tab" class="tab-content">
            <div class="test-controls">
                <select id="test-type-filter" onchange="loadTestBank()"
                    style="padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-weight: 600;">
                    <option value="reading">Reading Testlar</option>
                    <option value="listening">Listening Testlar</option>
                </select>
                <button class="add-test-btn" onclick="openTestModal()">+ Yangi Qo'shish</button>
            </div>
            <div class="test-list" id="test-list">
                <div class="no-records">Testlar yuklanmoqda...</div>
            </div>
        </div>
    </main>

    <!-- CMS Modal -->
    <div class="cms-modal" id="cms-modal">
        <div class="cms-modal-content">
            <div class="cms-modal-header">
                <h3 id="modal-title">Test Qo'shish</h3>
                <button class="cms-modal-close" onclick="closeTestModal()">×</button>
            </div>
            <form id="cms-form" onsubmit="saveTestRecord(event)">
                <input type="hidden" id="cms-id">
                <div class="cms-form-group">
                    <label>Test Turi</label>
                    <select id="cms-type" required>
                        <option value="reading">Reading</option>
                        <option value="listening">Listening</option>
                    </select>
                </div>
                <div class="cms-form-group">
                    <label>Reading Topic:</label>
                    <textarea id="cms-passage" placeholder="Matnni shu yerga joylang..."></textarea>
                </div>
                <div class="cms-form-group">
                    <label>Questions:</label>
                    <textarea id="cms-questions" required placeholder="Savollarni shu yerga joylang..."></textarea>
                </div>
                <div class="cms-form-group">
                    <label>Solutions:</label>
                    <textarea id="cms-answers" required placeholder="1. javob&#10;2. javob..."></textarea>
                    <small style="color: var(--text-muted); margin-top: 5px; display: block;">Javoblarni pastga qarab
                        raqamlab yozing (Masalan: 1. TRUE \n 2. FALSE)</small>
                </div>
                <button type="submit" class="cms-save-btn">Saqlash</button>
            </form>
        </div>
    </div>

    <script src="script.js?v=2"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('token');
            const role = localStorage.getItem('userRole');

            // Protect Admin Route
            if (!token || role !== 'admin') {
                window.location.href = 'index.html';
                return;
            }

            try {
                const res = await fetch('/api/admin/users', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!res.ok) throw new Error('Failed to fetch admin data');

                const users = await res.json();
                const usersGrid = document.getElementById('users-grid');
                document.getElementById('total-students').textContent = `Jami O'quvchilar: ${users.length}`;

                usersGrid.innerHTML = '';

                if (users.length === 0) {
                    usersGrid.innerHTML = '<div class="no-records">Hali hech kim ro\'yxatdan o\'tmagan.</div>';
                    return;
                }

                users.forEach(user => {
                    const card = document.createElement('div');
                    card.className = 'user-card';

                    let scoresHtml = '';
                    let percentSum = 0;
                    let scoresCount = 0;
                    if (user.scores && user.scores.length > 0) {
                        user.scores.forEach(score => {
                            const date = new Date(score.date).toLocaleString('uz-UZ', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                            const percent = Math.round((score.correct / score.total) * 100);
                            percentSum += percent;
                            scoresCount++;

                            let timeInfo = `<span class="admin-score-date">${date}</span>`;
                            if (score.start_time && score.end_time) {
                                const st = new Date(score.start_time).toLocaleString('uz-UZ');
                                const et = new Date(score.end_time).toLocaleString('uz-UZ');
                                timeInfo = `<div style="font-size: 0.8rem; color: var(--text-muted); margin-top: 4px;">Boshlandi: ${st} | Tugatildi: ${et}</div>`;
                            }

                            scoresHtml += `
                                <div class="admin-score-item">
                                    <div class="admin-score-details">
                                        <span class="admin-score-section">${score.section}</span>
                                        ${timeInfo}
                                    </div>
                                    <div class="admin-score-result">${score.correct}/${score.total} (${percent}%)</div>
                                </div>
                            `;
                        });
                    } else {
                        scoresHtml = '<div style="color:var(--text-muted); font-size:0.9rem; text-align:center; padding:10px 0;">Hali test ishlamagan</div>';
                    }

                    const avgPercent = scoresCount > 0 ? Math.round(percentSum / scoresCount) : 0;
                    const avgHtml = scoresCount > 0 ? `<div style="font-size:0.85rem; color: var(--primary-color); margin-top:5px; font-weight:600;">O'rtacha natija: ${avgPercent}%</div>` : '';

                    card.innerHTML = `
                        <div class="user-card-header" style="display:flex; justify-content:space-between; align-items:flex-start;">
                            <div>
                                <div class="user-name">${user.name}</div>
                                <div class="user-phone">📞 ${user.phone}</div>
                                ${avgHtml}
                            </div>
                            <button onclick="deleteUser(${user.id})" style="background:var(--error-color); color:white; border:none; padding:6px 10px; border-radius:6px; cursor:pointer; font-size:0.8rem; box-shadow:0 2px 4px rgba(239,68,68,0.2);">O'chirish</button>
                        </div>
                        <div class="user-scores-list">
                            <strong style="display:block; margin-bottom:10px; font-size:0.9rem; color:var(--text-main);">Oxirgi Natijalar:</strong>
                            ${scoresHtml}
                        </div>
                    `;
                    usersGrid.appendChild(card);
                });

            } catch (err) {
                console.error(err);
                document.getElementById('users-grid').innerHTML = '<div class="no-records">Ma\'lumotlarni yuklashda xatolik yuz berdi. Sizda admin huquqi yo\'q bo\'lishi mumkin.</div>';
            }
        });

        window.deleteUser = async function (userId) {
            if (!confirm("Rostdan ham ushbu o'quvchini va uning barcha natijalarini o'chirib tashlamoqchimisiz?")) return;
            const token = localStorage.getItem('token');
            try {
                const res = await fetch(`/api/admin/users/${userId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    window.location.reload();
                } else {
                    alert("O'chirishda xatolik yuz berdi.");
                }
            } catch (err) {
                console.error(err);
                alert("Server bilan bog'lanishda xatolik.");
            }
        };

        // CMS Logic
        window.switchTab = function (tabName) {
            document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

            event.target.classList.add('active');
            document.getElementById(`${tabName}-tab`).classList.add('active');

            if (tabName === 'tests') {
                loadTestBank();
            }
        };

        window.loadTestBank = async function () {
            const type = document.getElementById('test-type-filter').value;
            const token = localStorage.getItem('token');
            const listContainer = document.getElementById('test-list');
            listContainer.innerHTML = '<div class="no-records">Yuklanmoqda...</div>';

            try {
                const res = await fetch(`/api/admin/tests/${type}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) throw new Error('Fetch xatosi');
                const tests = await res.json();

                if (tests.length === 0) {
                    listContainer.innerHTML = '<div class="no-records">Hali testlar qo\'shilmagan.</div>';
                    return;
                }

                listContainer.innerHTML = tests.map(t => `
                    <div class="test-item">
                        <div class="test-item-title">${t.id}. ${t.title || 'Nomsiz test'}</div>
                        <div class="test-actions">
                            <button class="btn-edit" onclick="editTest('${type}', ${t.id})">Tahrirlash</button>
                            <button class="btn-delete" onclick="deleteTest('${type}', ${t.id})">O'chirish</button>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                listContainer.innerHTML = '<div class="no-records">Xatolik yuz berdi.</div>';
            }
        };

        // Helper to convert plain text with syntax {N} and [N|A,B,C] to HTML
        window.parseTextToHTML = function (text) {
            if (!text) return '';
            let html = text.replace(/</g, '&lt;').replace(/>/g, '&gt;');

            // Replace Dropdowns: [1|TRUE,FALSE,NOT GIVEN]
            html = html.replace(/\[(\d+)\|([^\]]+)\]/g, (match, qNum, options) => {
                let optsHtml = `<option value=""> </option>`;
                options.split(',').forEach(opt => {
                    let o = opt.trim();
                    optsHtml += `<option value="${o}">${o}</option>`;
                });
                return `<b>${qNum} </b><select id="q${qNum}" onchange="gdd(this)">${optsHtml}</select>`;
            });

            // Replace Inputs: {8}
            html = html.replace(/\{(\d+)\}/g, (match, qNum) => {
                return `<b>${qNum} </b><input type="text" required="" id="q${qNum}" onkeyup="gtb(this)">`;
            });

            // Convert newlines to paragraphs
            let paragraphs = html.split(/\n\n+/);
            html = paragraphs.map(p => {
                let content = p.replace(/\n/g, '<br>');
                return `<p>${content}</p>`;
            }).join('\n');

            return html;
        };

        // Helper to convert HTML back to plain text syntax
        window.parseHTMLToText = function (html) {
            if (!html) return '';
            let text = html;

            // Replace Selects with [N|A,B,C]
            text = text.replace(/<b>\s*(\d+)\s*<\/b>\s*<select[^>]*>([\s\S]*?)<\/select>/gi, (match, qNum, optionsHtml) => {
                let options = [];
                let optRegex = /<option[^>]*value="([^"]+)"[^>]*>/gi;
                let optMatch;
                while ((optMatch = optRegex.exec(optionsHtml)) !== null) {
                    if (optMatch[1].trim() !== '') {
                        options.push(optMatch[1]);
                    }
                }
                return `[${qNum}|${options.join(',')}]`;
            });

            // Replace Selects without bold tags
            text = text.replace(/<select[^>]*id="q(\d+)"[^>]*>([\s\S]*?)<\/select>/gi, (match, qNum, optionsHtml) => {
                let options = [];
                let optRegex = /<option[^>]*value="([^"]+)"[^>]*>/gi;
                let optMatch;
                while ((optMatch = optRegex.exec(optionsHtml)) !== null) {
                    if (optMatch[1].trim() !== '') {
                        options.push(optMatch[1]);
                    }
                }
                return `[${qNum}|${options.join(',')}]`;
            });

            // Replace Inputs with {N}
            text = text.replace(/<b>\s*(\d+)\s*<\/b>\s*<input[^>]+id="q\d+"[^>]*>/gi, (match, qNum) => {
                return `{${qNum}}`;
            });
            text = text.replace(/<input[^>]+id="q(\d+)"[^>]*>/gi, (match, qNum) => {
                return `{${qNum}}`;
            });

            // Strip styling tags and convert structural tags to newlines
            text = text.replace(/<br\s*\/?>/gi, '\n');
            text = text.replace(/<\/p>/gi, '\n\n');
            text = text.replace(/<\/h[1-6]>/gi, '\n\n');
            text = text.replace(/<\/div>/gi, '\n\n');
            text = text.replace(/<\/li>/gi, '\n');

            text = text.replace(/<[^>]+>/g, '');

            text = text.replace(/&nbsp;/g, ' ');
            text = text.replace(/&lt;/g, '<');
            text = text.replace(/&gt;/g, '>');
            text = text.replace(/&amp;/g, '&');

            text = text.replace(/\n{3,}/g, '\n\n');
            return text.trim();
        };

        window.formatAnswersToText = function (answers) {
            if (!answers) return '';
            let jsonObj = answers;
            if (typeof answers === 'string') {
                try { jsonObj = JSON.parse(answers); } catch (e) { return answers; }
            }
            if (typeof jsonObj !== 'object') return answers;

            let text = '';
            const keys = Object.keys(jsonObj).sort((a, b) => {
                let na = parseInt(a.replace(/\D/g, '')) || 0;
                let nb = parseInt(b.replace(/\D/g, '')) || 0;
                return na - nb;
            });

            for (let k of keys) {
                let ansObj = jsonObj[k];
                let answerStr = typeof ansObj === 'object' ? ansObj.answer : ansObj;
                let num = k.replace(/\D/g, '');
                text += `${num}. ${answerStr}\n`;
            }
            return text.trim();
        };

        window.openTestModal = function (test = null) {
            const modal = document.getElementById('cms-modal');
            const form = document.getElementById('cms-form');
            form.reset();

            if (test) {
                document.getElementById('modal-title').textContent = "Testni tahrirlash";
                document.getElementById('cms-id').value = test.id;
                document.getElementById('cms-type').value = document.getElementById('test-type-filter').value;
                document.getElementById('cms-passage').value = parseHTMLToText(test.passage);
                document.getElementById('cms-questions').value = parseHTMLToText(test.questions);
                document.getElementById('cms-answers').value = formatAnswersToText(test.answers);
            } else {
                document.getElementById('modal-title').textContent = "Yangi test qo'shish";
                document.getElementById('cms-id').value = '';
                document.getElementById('cms-type').value = document.getElementById('test-type-filter').value;
                document.getElementById('cms-passage').value = '';
                document.getElementById('cms-questions').value = '';
                document.getElementById('cms-answers').value = '';
            }

            modal.classList.add('active');
        };

        window.closeTestModal = function () {
            document.getElementById('cms-modal').classList.remove('active');
        };

        window.editTest = async function (type, id) {
            const token = localStorage.getItem('token');
            try {
                const res = await fetch(`/api/admin/tests/${type}/${id}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    const test = await res.json();
                    openTestModal(test);
                }
            } catch (err) {
                alert("Testni yuklashda xatolik!");
            }
        };

        window.deleteTest = async function (type, id) {
            if (!confirm("Haqiqatan ham ushbu testni o'chirmoqchimisiz?")) return;
            const token = localStorage.getItem('token');
            try {
                const res = await fetch(`/api/admin/tests/${type}/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    loadTestBank();
                } else {
                    alert("O'chirishda xatolik.");
                }
            } catch (err) {
                alert("Server xatosi.");
            }
        };

        window.saveTestRecord = async function (e) {
            e.preventDefault();
            const id = document.getElementById('cms-id').value;
            const type = document.getElementById('cms-type').value;
            const token = localStorage.getItem('token');
            const btn = document.querySelector('.cms-save-btn');

            const rawAnswers = document.getElementById('cms-answers').value;
            let answersJson = {};

            const trimmed = rawAnswers.trim();
            if (trimmed.startsWith('{') && trimmed.endsWith('}')) {
                try {
                    answersJson = JSON.parse(trimmed);
                } catch (err) {
                    alert("JSON formatida xatolik bor!");
                    return;
                }
            } else {
                const lines = trimmed.split('\n');
                lines.forEach(line => {
                    const l = line.trim();
                    if (!l) return;
                    const match = l.match(/^q?(\d+)[\.\:\)]?\s*(.+)$/i);
                    if (match) {
                        answersJson[`q${match[1]}`] = { answer: match[2].trim() };
                    }
                });

                if (Object.keys(answersJson).length === 0) {
                    alert("Javoblar topilmadi. Javoblarni '1. TRUE' kabi formatda kiriting.");
                    return;
                }
            }

            let generatedTitle = "Nomsiz Test";
            const typeFilter = document.getElementById('cms-type').value;
            if (typeFilter === 'reading') {
                generatedTitle = `Reading Test: ${new Date().toLocaleDateString()}`;
            } else {
                generatedTitle = `Listening Test: ${new Date().toLocaleDateString()}`;
            }

            const payload = {
                title: generatedTitle,
                passage: parseTextToHTML(document.getElementById('cms-passage').value),
                questions: parseTextToHTML(document.getElementById('cms-questions').value),
                answers: JSON.stringify(answersJson)
            };

            btn.disabled = true;
            btn.textContent = "Saqlanmoqda...";

            const url = id ? `/api/admin/tests/${type}/${id}` : `/api/admin/tests/${type}`;
            const method = id ? 'PUT' : 'POST';

            try {
                const res = await fetch(url, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    closeTestModal();
                    loadTestBank();
                } else {
                    const data = await res.json();
                    alert(data.error || "Saqlashda xatolik yuz berdi.");
                }
            } catch (err) {
                alert("Xatolik!");
            } finally {
                btn.disabled = false;
                btn.textContent = "Saqlash";
            }
        };
    </script>
</body>

</html>
