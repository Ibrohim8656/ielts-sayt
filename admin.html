<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS PRACTICE ZEMSTARK - Admin Panel</title>
    <link rel="stylesheet" href="style.css?v=2">
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--surface-color);
            padding: 25px 30px;
            border-radius: 12px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            margin-bottom: 30px;
        }

        .admin-header h2 {
            color: var(--primary-color);
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .users-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        .user-card {
            background: var(--surface-color);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            border-top: 4px solid var(--primary-color);
        }

        .user-card-header {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 15px;
        }

        .user-name {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 5px;
        }

        .user-phone {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .admin-score-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px dotted var(--border-color);
        }

        .admin-score-item:last-child {
            border-bottom: none;
        }

        .admin-score-details {
            display: flex;
            flex-direction: column;
        }

        .admin-score-section {
            font-weight: 600;
            color: var(--text-main);
            font-size: 0.95rem;
        }

        .admin-score-date {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 3px;
        }

        .admin-score-result {
            font-weight: 700;
            color: var(--primary-color);
            background: #eff6ff;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        .no-records {
            text-align: center;
            color: var(--text-muted);
            padding: 40px;
            grid-column: 1 / -1;
            background: var(--surface-color);
            border-radius: 12px;
        }

        .user-scores-list {
            max-height: 250px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .user-scores-list::-webkit-scrollbar {
            width: 6px;
        }

        .user-scores-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .user-scores-list::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        /* Tabs Styling */
        .admin-tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }

        .admin-tab {
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-muted);
            border: none;
            background: none;
            position: relative;
        }

        .admin-tab.active {
            color: var(--primary-color);
        }

        .admin-tab.active::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--primary-color);
            border-radius: 3px 3px 0 0;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Test Bank Styling */
        .test-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .add-test-btn {
            background: var(--primary-color);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(37, 99, 235, 0.2);
        }

        .test-list {
            background: var(--surface-color);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .test-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            border-bottom: 1px solid var(--border-color);
        }

        .test-item:last-child {
            border-bottom: none;
        }

        .test-item-title {
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--text-main);
        }

        .test-actions button {
            padding: 6px 12px;
            margin-left: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .btn-edit {
            background: #f59e0b;
            color: white;
        }

        .btn-delete {
            background: var(--error-color);
            color: white;
        }

        /* Modal Styling */
        .cms-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .cms-modal.active {
            display: flex;
        }

        .cms-modal-content {
            background: var(--surface-color);
            width: 100%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .cms-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .cms-modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-muted);
        }

        .cms-form-group {
            margin-bottom: 20px;
        }

        .cms-form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-main);
        }

        .cms-form-group input,
        .cms-form-group textarea,
        .cms-form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: inherit;
        }

        .cms-form-group textarea {
            min-height: 150px;
            resize: vertical;
        }

        .cms-save-btn {
            background: var(--success-color);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
    </style>
    <script>if (!localStorage.getItem('token')) { window.location.href = 'login.html'; }</script>
</head>

<body class="profile-body">
    <header class="app-header">
        <div class="brand">
            <h1><a href="index.html">IELTS PRACTICE <span class="brand-sub">ZEMSTARK</span></a></h1>
        </div>
        <nav class="auth-nav">
            <button id="logout-btn" class="nav-btn logout">Chiqish</button>
        </nav>
    </header>

    <main class="admin-container">
        <div class="admin-header">
            <h2>👨‍🏫 O'qituvchi Boshqaruvi (Admin)</h2>
            <div id="total-students">Yuklanmoqda...</div>
        </div>

        <div class="admin-tabs">
            <button class="admin-tab active" onclick="switchTab('students')">O'quvchilar</button>
            <button class="admin-tab" onclick="switchTab('tests')">Testlar</button>
            <button class="admin-tab" onclick="switchTab('create-user')">Foydalanuvchi Qo'shish</button>
        </div>

        <div id="students-tab" class="tab-content active">
            <div class="users-grid" id="users-grid">
                <div class="no-records">Ma'lumotlar yuklanmoqda...</div>
            </div>
        </div>

        <div id="tests-tab" class="tab-content">
            <div class="test-controls">
                <select id="test-type-filter" onchange="loadTestBank()"
                    style="padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-weight: 600;">
                    <option value="reading">Reading Testlar</option>
                    <option value="listening">Listening Testlar</option>
                </select>
                <button class="add-test-btn" onclick="openTestModal()">+ Yangi Qo'shish</button>
            </div>
            <div class="test-list" id="test-list">
                <div class="no-records">Testlar yuklanmoqda...</div>
            </div>
        </div>
        <div id="create-user-tab" class="tab-content"
            style="max-width: 500px; margin: 0 auto; background: var(--card-bg); padding: 25px; border-radius: 12px; border: 1px solid var(--border-color);">
            <h3 style="color: var(--text-color); margin-bottom: 20px;">Yangi Foydalanuvchi Ro'yxatdan O'tkazish</h3>
            <form id="admin-create-user-form">
                <div class="cms-form-group">
                    <label>Ism Familiya</label>
                    <input type="text" id="add-user-name" required placeholder="To'liq ism">
                </div>
                <div class="cms-form-group">
                    <label>Telefon Raqam</label>
                    <input type="text" id="add-user-phone" required placeholder="+998901234567">
                </div>
                <div class="cms-form-group">
                    <label>Parol</label>
                    <input type="text" id="add-user-pass" required value="123456">
                    <small style="color: var(--text-muted);">Standart parol 123456</small>
                </div>
                <div class="cms-form-group">
                    <label>Rol</label>
                    <select id="add-user-role" required>
                        <option value="user">O'quvchi</option>
                        <option value="teacher">O'qituvchi</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <div id="add-user-res" style="margin-bottom: 15px; font-size: 14px; font-weight: 600;"></div>
                <button type="submit" class="cms-save-btn">Foydalanuvchini Qo'shish</button>
            </form>
        </div>
    </main>

    <!-- CMS Modal -->
    <div class="cms-modal" id="cms-modal">
        <div class="cms-modal-content">
            <div class="cms-modal-header">
                <h3 id="modal-title">Test Qo'shish</h3>
                <button class="cms-modal-close" onclick="closeTestModal()">×</button>
            </div>
            <form id="cms-form" onsubmit="saveTestRecord(event)">
                <input type="hidden" id="cms-id">
                <div class="cms-form-group">
                    <label>Test Turi</label>
                    <select id="cms-type" required>
                        <option value="reading">Reading</option>
                        <option value="listening">Listening</option>
                    </select>
                </div>
                <div class="cms-form-group">
                    <label>Reading / Listening Passage o'rni (Text):</label>
                    <textarea id="cms-passage" placeholder="Matnni shu yerga joylang... (Agar bo'lsa)"></textarea>
                </div>

                <div class="cms-form-group">
                    <label>Savollar:</label>
                    <div id="questions-container"
                        style="background:var(--bg-body); padding:15px; border-radius:8px; border:1px solid var(--border-color); min-height: 100px; max-height: 400px; overflow-y: auto;">
                        <!-- Dynamic questions go here -->
                    </div>
                    <button type="button" class="action-btn" onclick="addQuestionBlock()"
                        style="margin-top:10px; width:100%;">+ Yangi Savol Qo'shish</button>
                </div>

                <!-- Hidden inputs for backward compatibility with the existing save logic -->
                <textarea id="cms-questions" style="display:none;"></textarea>
                <textarea id="cms-answers" style="display:none;"></textarea>

                <div style="margin-top:20px;">
                    <button type="submit" class="cms-save-btn">Saqlash</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js?v=2"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('token');
            const role = localStorage.getItem('userRole');

            // Protect Admin Route
            if (!token || role !== 'admin') {
                window.location.href = 'index.html';
                return;
            }

            try {
                const res = await fetch('/api/admin/users', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!res.ok) throw new Error('Failed to fetch admin data');

                const users = await res.json();
                const usersGrid = document.getElementById('users-grid');
                document.getElementById('total-students').textContent = `Jami O'quvchilar: ${users.length}`;

                usersGrid.innerHTML = '';

                if (users.length === 0) {
                    usersGrid.innerHTML = '<div class="no-records">Hali hech kim ro\'yxatdan o\'tmagan.</div>';
                    return;
                }

                users.forEach(user => {
                    const card = document.createElement('div');
                    card.className = 'user-card';

                    let scoresHtml = '';
                    let percentSum = 0;
                    let scoresCount = 0;
                    if (user.scores && user.scores.length > 0) {
                        user.scores.forEach(score => {
                            const date = new Date(score.date).toLocaleString('uz-UZ', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                            const percent = Math.round((score.correct / score.total) * 100);
                            percentSum += percent;
                            scoresCount++;

                            let timeInfo = `<span class="admin-score-date">${date}</span>`;
                            if (score.start_time && score.end_time) {
                                const st = new Date(score.start_time).toLocaleString('uz-UZ');
                                const et = new Date(score.end_time).toLocaleString('uz-UZ');
                                timeInfo = `<div style="font-size: 0.8rem; color: var(--text-muted); margin-top: 4px;">Boshlandi: ${st} | Tugatildi: ${et}</div>`;
                            }

                            scoresHtml += `
                                <div class="admin-score-item">
                                    <div class="admin-score-details">
                                        <span class="admin-score-section">${score.section}</span>
                                        ${timeInfo}
                                    </div>
                                    <div class="admin-score-result">${score.correct}/${score.total} (${percent}%)</div>
                                </div>
                            `;
                        });
                    } else {
                        scoresHtml = '<div style="color:var(--text-muted); font-size:0.9rem; text-align:center; padding:10px 0;">Hali test ishlamagan</div>';
                    }

                    const avgPercent = scoresCount > 0 ? Math.round(percentSum / scoresCount) : 0;
                    const avgHtml = scoresCount > 0 ? `<div style="font-size:0.85rem; color: var(--primary-color); margin-top:5px; font-weight:600;">O'rtacha natija: ${avgPercent}%</div>` : '';

                    card.innerHTML = `
                        <div class="user-card-header" style="display:flex; justify-content:space-between; align-items:flex-start;">
                            <div>
                                <div class="user-name">${user.name}</div>
                                <div class="user-phone">📞 ${user.phone}</div>
                                ${avgHtml}
                            </div>
                            <button onclick="deleteUser(${user.id})" style="background:var(--error-color); color:white; border:none; padding:6px 10px; border-radius:6px; cursor:pointer; font-size:0.8rem; box-shadow:0 2px 4px rgba(239,68,68,0.2);">O'chirish</button>
                        </div>
                        <div class="user-scores-list">
                            <strong style="display:block; margin-bottom:10px; font-size:0.9rem; color:var(--text-main);">Oxirgi Natijalar:</strong>
                            ${scoresHtml}
                        </div>
                    `;
                    usersGrid.appendChild(card);
                });

            } catch (err) {
                console.error(err);
                document.getElementById('users-grid').innerHTML = '<div class="no-records">Ma\'lumotlarni yuklashda xatolik yuz berdi. Sizda admin huquqi yo\'q bo\'lishi mumkin.</div>';
            }
        });

        window.deleteUser = async function (userId) {
            if (!confirm("Rostdan ham ushbu o'quvchini va uning barcha natijalarini o'chirib tashlamoqchimisiz?")) return;
            const token = localStorage.getItem('token');
            try {
                const res = await fetch(`/api/admin/users/${userId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    window.location.reload();
                } else {
                    alert("O'chirishda xatolik yuz berdi.");
                }
            } catch (err) {
                console.error(err);
                alert("Server bilan bog'lanishda xatolik.");
            }
        };

        // CMS Logic
        window.switchTab = function (tabName) {
            document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

            event.target.classList.add('active');
            document.getElementById(`${tabName}-tab`).classList.add('active');

            if (tabName === 'tests') {
                loadTestBank();
            }
        };

        window.loadTestBank = async function () {
            const type = document.getElementById('test-type-filter').value;
            const token = localStorage.getItem('token');
            const listContainer = document.getElementById('test-list');
            listContainer.innerHTML = '<div class="no-records">Yuklanmoqda...</div>';

            try {
                const res = await fetch(`/api/admin/tests/${type}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) throw new Error('Fetch xatosi');
                const tests = await res.json();

                if (tests.length === 0) {
                    listContainer.innerHTML = '<div class="no-records">Hali testlar qo\'shilmagan.</div>';
                    return;
                }

                listContainer.innerHTML = tests.map(t => `
                    <div class="test-item">
                        <div class="test-item-title">${t.id}. ${t.title || 'Nomsiz test'}</div>
                        <div class="test-actions">
                            <button class="btn-edit" onclick="editTest('${type}', ${t.id})">Tahrirlash</button>
                            <button class="btn-delete" onclick="deleteTest('${type}', ${t.id})">O'chirish</button>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                listContainer.innerHTML = '<div class="no-records">Xatolik yuz berdi.</div>';
            }
        };

        // Helper to convert plain text with syntax {N} and [N|A,B,C] to HTML
        window.parseTextToHTML = function (text) {
            if (!text) return '';
            let html = text.replace(/</g, '&lt;').replace(/>/g, '&gt;');

            // Replace Dropdowns: [1|TRUE,FALSE,NOT GIVEN]
            html = html.replace(/\[(\d+)\|([^\]]+)\]/g, (match, qNum, options) => {
                let optsHtml = `<option value=""> </option>`;
                options.split(',').forEach(opt => {
                    let o = opt.trim();
                    optsHtml += `<option value="${o}">${o}</option>`;
                });
                return `<b>${qNum} </b><select id="q${qNum}" onchange="gdd(this)">${optsHtml}</select>`;
            });

            // Replace Inputs: {8}
            html = html.replace(/\{(\d+)\}/g, (match, qNum) => {
                return `<b>${qNum} </b><input type="text" required="" id="q${qNum}" onkeyup="gtb(this)">`;
            });

            // Convert newlines to paragraphs
            let paragraphs = html.split(/\n\n+/);
            html = paragraphs.map(p => {
                let content = p.replace(/\n/g, '<br>');
                return `<p>${content}</p>`;
            }).join('\n');

            return html;
        };

        // Helper to convert HTML back to plain text syntax
        window.parseHTMLToText = function (html) {
            if (!html) return '';
            let text = html;

            // Replace Selects with [N|A,B,C]
            text = text.replace(/<b>\s*(\d+)\s*<\/b>\s*<select[^>]*>([\s\S]*?)<\/select>/gi, (match, qNum, optionsHtml) => {
                let options = [];
                let optRegex = /<option[^>]*value="([^"]+)"[^>]*>/gi;
                let optMatch;
                while ((optMatch = optRegex.exec(optionsHtml)) !== null) {
                    if (optMatch[1].trim() !== '') {
                        options.push(optMatch[1].trim());
                    }
                }
                return `[${qNum}|${options.join(',')}]`;
            });

            // Replace Inputs with {N}
            text = text.replace(/<b>\s*(\d+)\s*<\/b>\s*<input[^>]*>/gi, (match, qNum) => {
                return `{${qNum}}`;
            });

            // Replace paragraphs with newlines
            text = text.replace(/<p>/gi, '').replace(/<\/p>/gi, '\n\n');
            text = text.replace(/<br>/gi, '\n');

            // Clean up left over HTML entities
            text = text.replace(/&lt;/g, '<').replace(/&gt;/g, '>');

            // Replace Selects without bold tags
            text = text.replace(/<select[^>]*id="q(\d+)"[^>]*>([\s\S]*?)<\/select>/gi, (match, qNum, optionsHtml) => {
                let options = [];
                let optRegex = /<option[^>]*value="([^"]+)"[^>]*>/gi;
                let optMatch;
                while ((optMatch = optRegex.exec(optionsHtml)) !== null) {
                    if (optMatch[1].trim() !== '') {
                        options.push(optMatch[1]);
                    }
                }
                return `[${qNum}|${options.join(',')}]`;
            });

            // Replace Inputs with {N}
            text = text.replace(/<b>\s*(\d+)\s*<\/b>\s*<input[^>]+id="q\d+"[^>]*>/gi, (match, qNum) => {
                return `{${qNum}}`;
            });
            text = text.replace(/<input[^>]+id="q(\d+)"[^>]*>/gi, (match, qNum) => {
                return `{${qNum}}`;
            });

            // Strip styling tags and convert structural tags to newlines
            text = text.replace(/<br\s*\/?>/gi, '\n');
            text = text.replace(/<\/p>/gi, '\n\n');
            text = text.replace(/<\/h[1-6]>/gi, '\n\n');
            text = text.replace(/<\/div>/gi, '\n\n');
            text = text.replace(/<\/li>/gi, '\n');

            text = text.replace(/<[^>]+>/g, '');

            text = text.replace(/&nbsp;/g, ' ');
            text = text.replace(/&lt;/g, '<');
            text = text.replace(/&gt;/g, '>');
            text = text.replace(/&amp;/g, '&');

            return text.trim();
        };

        // Admin Create User Form Logic
        document.getElementById('admin-create-user-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const resDiv = document.getElementById('add-user-res');
            btn.disabled = true;
            resDiv.textContent = "Kutilmoqda...";

            try {
                const token = localStorage.getItem('token');
                const name = document.getElementById('add-user-name').value;
                const phone = document.getElementById('add-user-phone').value;
                const password = document.getElementById('add-user-pass').value;
                const role = document.getElementById('add-user-role').value;

                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ name, phone, password, role })
                });

                const data = await res.json();
                if (res.ok) {
                    resDiv.style.color = "var(--success-color)";
                    resDiv.textContent = "Muvaffaqiyatli qo'shildi!";
                    document.getElementById('add-user-name').value = '';
                    document.getElementById('add-user-phone').value = '';
                    document.getElementById('add-user-pass').value = '123456';
                } else {
                    resDiv.style.color = "var(--error-color)";
                    resDiv.textContent = data.error;
                }
            } catch (err) {
                resDiv.style.color = "var(--error-color)";
                resDiv.textContent = "Server xatosi";
            }
            btn.disabled = false;
        });

        window.formatAnswersToText = function (answers) {
            if (!answers) return '';
            let jsonObj = answers;
            if (typeof answers === 'string') {
                try { jsonObj = JSON.parse(answers); } catch (e) { return answers; }
            }
            if (typeof jsonObj !== 'object') return answers;

            let text = '';
            const keys = Object.keys(jsonObj).sort((a, b) => {
                let na = parseInt(a.replace(/\D/g, '')) || 0;
                let nb = parseInt(b.replace(/\D/g, '')) || 0;
                return na - nb;
            });

            for (let k of keys) {
                let ansObj = jsonObj[k];
                let answerStr = typeof ansObj === 'object' ? ansObj.answer : ansObj;
                let num = k.replace(/\D/g, '');
                text += `${num}. ${answerStr}\n`;
            }
            return text.trim();
        };

        let questionCount = 0;

        window.addQuestionBlock = function (data = null) {
            questionCount++;
            const container = document.getElementById('questions-container');

            const block = document.createElement('div');
            block.className = 'q-block';
            block.id = `q-block-${questionCount}`;
            block.style.cssText = "background:var(--surface-color); padding:15px; border-radius:8px; border:1px solid var(--border-color); margin-bottom:15px; position:relative;";

            let qNum = data ? data.num : questionCount;
            let qText = data ? data.text : "";
            let qType = data ? data.type : "input"; // "input" or "select"

            let blockHtml = `
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <strong style="color:var(--primary-color);">Savol ${qNum}</strong>
                    <button type="button" onclick="removeQuestionBlock(${questionCount})" style="background:none; border:none; color:var(--error-color); cursor:pointer; font-size:1.2rem;">&times;</button>
                </div>
                <div style="display:flex; gap:10px; margin-bottom:10px;">
                    <input type="number" class="q-num-input" style="width:60px; padding:8px; border:1px solid var(--border-color); border-radius:6px;" value="${qNum}" placeholder="No" title="Savol raqami">
                    <input type="text" class="q-text-input" style="flex:1; padding:8px; border:1px solid var(--border-color); border-radius:6px;" value="${qText}" placeholder="Savol matnini kiriting (ixtiyoriy)">
                    <select class="q-type-select" style="padding:8px; border:1px solid var(--border-color); border-radius:6px;" onchange="handleQuestionTypeChange(${questionCount})">
                        <option value="input" ${qType === 'input' ? 'selected' : ''}>Yozma javob</option>
                        <option value="select" ${qType === 'select' ? 'selected' : ''}>Variantli (A,B,C)</option>
                    </select>
                </div>
                
                <!-- Options Container (Only for Select Type) -->
                <div id="q-options-${questionCount}" style="display:${qType === 'select' ? 'block' : 'none'}; padding-left:70px;">
                    <div class="options-list"></div>
                    <button type="button" onclick="addOptionToBlock(${questionCount})" style="background:none; border:1px dashed var(--border-color); color:var(--text-muted); padding:5px 10px; border-radius:6px; cursor:pointer; font-size:0.85rem; margin-top:5px;">+ Variant qo'shish</button>
                    <div style="margin-top:10px;">
                        <input type="text" class="q-correct-select" placeholder="To'g'ri javobni yozing (masalan: TRUE yoki A)" style="padding:8px; border:1px solid var(--success-color); border-radius:6px; width:100%;">
                    </div>
                </div>

                <!-- Answer Input (Only for Input Type) -->
                <div id="q-answer-${questionCount}" style="display:${qType === 'input' ? 'block' : 'none'}; padding-left:70px;">
                    <input type="text" class="q-correct-input" placeholder="To'g'ri javobni yozing (Masalan: Apple)" style="padding:8px; border:1px solid var(--success-color); border-radius:6px; width:100%;" value="${data && qType === 'input' ? data.answer : ''}">
                </div>
            `;

            block.innerHTML = blockHtml;
            container.appendChild(block);

            // Populate options if editing data exists
            if (data && data.type === 'select' && data.options) {
                data.options.forEach(opt => addOptionToBlock(questionCount, opt));
                block.querySelector('.q-correct-select').value = data.answer || '';
            }
        };

        window.removeQuestionBlock = function (id) {
            const block = document.getElementById(`q-block-${id}`);
            if (block) block.remove();
        };

        window.handleQuestionTypeChange = function (id) {
            const block = document.getElementById(`q-block-${id}`);
            const type = block.querySelector('.q-type-select').value;
            block.querySelector(`#q-options-${id}`).style.display = type === 'select' ? 'block' : 'none';
            block.querySelector(`#q-answer-${id}`).style.display = type === 'input' ? 'block' : 'none';
        };

        window.addOptionToBlock = function (id, val = '') {
            const list = document.querySelector(`#q-options-${id} .options-list`);
            const optDiv = document.createElement('div');
            optDiv.style.display = 'flex';
            optDiv.style.gap = '5px';
            optDiv.style.marginBottom = '5px';
            optDiv.innerHTML = `
                <input type="text" value="${val}" placeholder="Variant (A)" style="flex:1; padding:6px; border:1px solid var(--border-color); border-radius:4px;">
                <button type="button" onclick="this.parentElement.remove()" style="background:none; border:none; color:var(--error-color); cursor:pointer;">&times;</button>
            `;
            list.appendChild(optDiv);
        };

        // Parse existing HTML back into block data for editing
        window.parseExistingTestToBlocks = function (questionsHtml, answersJson) {
            document.getElementById('questions-container').innerHTML = '';
            questionCount = 0;
            if (!questionsHtml) {
                addQuestionBlock(); // Empty initial block
                return;
            }

            let answers = typeof answersJson === 'string' ? JSON.parse(answersJson || '{}') : (answersJson || {});

            // Dummy container to parse HTML
            const dummy = document.createElement('div');
            dummy.innerHTML = questionsHtml;

            // Simple parser: find <b> elements (they hold question numbers)
            const bTags = dummy.querySelectorAll('b');
            if (bTags.length === 0) {
                addQuestionBlock(); return;
            }

            bTags.forEach(b => {
                let num = b.textContent.trim().replace(/\D/g, '');
                if (!num) return;
                let ansObj = answers[`q${num}`];
                let answerStr = ansObj ? (typeof ansObj === 'object' ? ansObj.answer : ansObj) : '';

                // Check what follows the <b> tag
                let nextEl = b.nextElementSibling;
                if (nextEl && nextEl.tagName === 'SELECT') {
                    // It's a multiple choice
                    let options = [];
                    nextEl.querySelectorAll('option').forEach(opt => {
                        if (opt.value) options.push(opt.value);
                    });

                    addQuestionBlock({ num: num, text: '', type: 'select', options: options, answer: answerStr });
                } else if (nextEl && nextEl.tagName === 'INPUT') {
                    addQuestionBlock({ num: num, text: '', type: 'input', answer: answerStr });
                } else {
                    addQuestionBlock({ num: num, text: '', type: 'input', answer: answerStr });
                }
            });
        };

        window.openTestModal = function (test = null) {
            const modal = document.getElementById('cms-modal');
            const form = document.getElementById('cms-form');
            form.reset();
            document.getElementById('questions-container').innerHTML = '';

            if (test) {
                document.getElementById('modal-title').textContent = "Testni tahrirlash";
                document.getElementById('cms-id').value = test.id;
                document.getElementById('cms-type').value = document.getElementById('test-type-filter').value;
                document.getElementById('cms-passage').value = parseHTMLToText(test.passage);

                parseExistingTestToBlocks(test.questions, test.answers);
            } else {
                document.getElementById('modal-title').textContent = "Yangi test qo'shish";
                document.getElementById('cms-id').value = '';
                document.getElementById('cms-type').value = document.getElementById('test-type-filter').value;
                document.getElementById('cms-passage').value = '';
                addQuestionBlock({ num: '1', text: '', type: 'input', answer: '' });
            }

            modal.classList.add('active');
        };

        window.closeTestModal = function () {
            document.getElementById('cms-modal').classList.remove('active');
        };

        window.editTest = async function (type, id) {
            const token = localStorage.getItem('token');
            try {
                const res = await fetch(`/api/admin/tests/${type}/${id}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    const test = await res.json();
                    openTestModal(test);
                }
            } catch (err) {
                alert("Testni yuklashda xatolik!");
            }
        };

        window.deleteTest = async function (type, id) {
            if (!confirm("Haqiqatan ham ushbu testni o'chirmoqchimisiz?")) return;
            const token = localStorage.getItem('token');
            try {
                const res = await fetch(`/api/admin/tests/${type}/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    loadTestBank();
                } else {
                    alert("O'chirishda xatolik.");
                }
            } catch (err) {
                alert("Server xatosi.");
            }
        };

        window.saveTestRecord = async function (e) {
            e.preventDefault();
            const id = document.getElementById('cms-id').value;
            const type = document.getElementById('cms-type').value;
            const token = localStorage.getItem('token');
            const btn = document.querySelector('.cms-save-btn');

            let generatedHtml = "";
            let answersJson = {};
            let hasErrors = false;

            const blocks = document.querySelectorAll('.q-block');
            if (blocks.length === 0) {
                alert("Kamida bitta savol qo'shing!");
                return;
            }

            blocks.forEach(block => {
                const qNumStr = block.querySelector('.q-num-input').value;
                const qNum = parseInt(qNumStr);
                const qText = block.querySelector('.q-text-input').value.trim();
                const qType = block.querySelector('.q-type-select').value;

                if (!qNumStr) {
                    alert(`Iltimos barcha savollar uchun raqam (No) kiriting! (Blok ID: ${block.id})`);
                    hasErrors = true;
                    return;
                }

                if (qText) {
                    generatedHtml += `<p>${qText}</p>\n`;
                }

                if (qType === 'input') {
                    generatedHtml += `<b>${qNum} </b><input type="text" required="" id="q${qNum}" onkeyup="gtb(this)">\n<br><br>\n`;
                    let correctAns = block.querySelector('.q-correct-input').value.trim();
                    if (!correctAns) {
                        alert(`${qNum}-savol uchun to'g'ri javobni kiritish esdan chiqdi.`);
                        hasErrors = true;
                    }
                    answersJson[`q${qNum}`] = { answer: correctAns };
                } else if (qType === 'select') {
                    let optsInner = `<option value=""> </option>`;
                    let optionsInputs = block.querySelectorAll(`#q-options-${block.id.split('-')[2]} .options-list input[type="text"]`);

                    if (optionsInputs.length === 0) {
                        alert(`${qNum}-savol (Variantli) kamida bitta variantga ega bo'lishi kerak.`);
                        hasErrors = true;
                    }

                    optionsInputs.forEach(opt => {
                        let val = opt.value.trim();
                        if (val) optsInner += `<option value="${val}">${val}</option>`;
                    });

                    generatedHtml += `<b>${qNum} </b><select id="q${qNum}" onchange="gdd(this)">${optsInner}</select>\n<br><br>\n`;

                    let correctAns = block.querySelector('.q-correct-select').value.trim();
                    if (!correctAns) {
                        alert(`${qNum}-savol (Variantli) uchun to'g'ri javobni kiritish esdan chiqdi.`);
                        hasErrors = true;
                    }
                    answersJson[`q${qNum}`] = { answer: correctAns };
                }
            });

            if (hasErrors) return;

            let generatedTitle = "Nomsiz Test";
            const typeFilter = document.getElementById('cms-type').value;
            if (typeFilter === 'reading') {
                generatedTitle = `Reading Test: ${new Date().toLocaleDateString()}`;
            } else {
                generatedTitle = `Listening Test: ${new Date().toLocaleDateString()}`;
            }

            const payload = {
                title: generatedTitle,
                passage: parseTextToHTML(document.getElementById('cms-passage').value),
                questions: generatedHtml,
                answers: JSON.stringify(answersJson)
            };

            btn.disabled = true;
            btn.textContent = "Saqlanmoqda...";

            const url = id ? `/api/admin/tests/${type}/${id}` : `/api/admin/tests/${type}`;
            const method = id ? 'PUT' : 'POST';

            try {
                const res = await fetch(url, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    closeTestModal();
                    loadTestBank();
                } else {
                    const data = await res.json();
                    alert(data.error || "Saqlashda xatolik yuz berdi.");
                }
            } catch (err) {
                alert("Xatolik!");
            } finally {
                btn.disabled = false;
                btn.textContent = "Saqlash";
            }
        };
    </script>
</body>

</html>
